<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込みフォーム | DESIGN CAMPUS</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- =========================
    Header
  ========================= -->
  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <a href="index.html">
         <img src="assets/images/icon/icon-logo.png" alt="Design Campus">
        </a>
      </div>

      <nav class="header__nav">
        <ul class="header__list">
          <li><a href="index.html#features">本講座の特徴</a></li>
          <li><a href="index.html#courses">講座一覧</a></li>
          <li><a href="index.html#faq">よくあるご質問</a></li>
        </ul>
      </nav>

      <!-- ハンバーガー -->
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="header__cta">
        <a href="contact.html" class="header__button">お申し込みはこちら</a>
      </div>
    </div>
  </header>

  <!-- ハンバーガー -->
  <div class="menu-sp" id="menu">
  <div class="menu-sp__close" id="close">×</div>
    <ul class="menu-sp__list">
      <li>本講座の特徴</li>
      <li>講座一覧</li>
      <li>よくあるご質問</li>
    </ul>
    <a href="contact.html" class="menu-sp__button">
      申し込みはこちら
    </a>
  </div>

  <!-- =========================
    Contact
  ========================= -->
  <section class="contact">
    <div class="contact__inner">
      <h1 class="contact__title">1day講座申し込みフォーム</h1>

      <form class="contact-form" id="contactForm" novalidate>
        <div class="contact-form__group">
          <label class="contact-form__label">
            名前 <span class="contact-form__required">必須</span>
          </label>
          <input type="text" name="name" class="contact-form__input" required>
          <p class="error-message"></p>
        </div>

        <div class="contact-form__group">
          <label class="contact-form__label">
            メールアドレス <span class="contact-form__required">必須</span>
          </label>
          <input type="email" name="email" class="contact-form__input" required>
          <p class="error-message"></p>
        </div>

        <div class="contact-form__group">
          <label class="contact-form__label">
            電話番号
          </label>
          <input type="text" name="phone" class="contact-form__input">
        </div>

        <div class="contact-form__group">
          <label class="contact-form__label">
            参加希望 <span class="contact-form__required">必須</span>
          </label>

          <label class="contact-form__check">
            <input type="checkbox" name="consult">
            <span>
              12/10(日)<br>
              2時間でかんたんに名刺デザインを作成してみよう！
            </span>
          </label>

          <label class="contact-form__check">
            <input type="checkbox" name="consult">
            <span>
              12/17(日)<br>
              集客のためのWeb活用術〜SEOとユーザビリティのお話〜
            </span>
          </label>

          <label class="contact-form__agree">
          <input type="checkbox" name="consult">
          <span>プライバシーポリシーに同意する</span>
        </label>
        </div>

        <div class="contact-form__actions">
          <button type="submit" class="contact-form__submit">送信</button>
        </div>
      </form>
    </div>
  </section>

  <!-- =========================
    Footer
  ========================= -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">Copyright 2023 DESIGN CAMPUS</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>

<script src="assets/js/main.js"></script></body>
</html>
